name: Bug report
description: Report a reproducible bug in TouchAI
title: '[Bug]: '
labels:
    - kind:bug
    - status:triage
body:
    - type: markdown
      attributes:
          value: |
              Thanks for reporting a bug. Please provide a minimal, reproducible report.
    - type: textarea
      id: summary
      attributes:
          label: Summary
          description: What is broken?
          placeholder: A short description of the bug.
      validations:
          required: true
    - type: textarea
      id: steps
      attributes:
          label: Steps to reproduce
          description: Provide the exact steps needed to trigger the problem.
          placeholder: |
              1. Open ...
              2. Click ...
              3. Observe ...
      validations:
          required: true
    - type: textarea
      id: expected
      attributes:
          label: Expected behavior
      validations:
          required: true
    - type: textarea
      id: actual
      attributes:
          label: Actual behavior
      validations:
          required: true
    - type: dropdown
      id: area
      attributes:
          label: Affected area
          options:
              - frontend
              - tauri
              - AgentService
              - database
              - MCP
              - CI or tooling
              - unknown
      validations:
          required: true
    - type: input
      id: version
      attributes:
          label: TouchAI version
          placeholder: 0.1.0
    - type: textarea
      id: environment
      attributes:
          label: Environment
          description: Include OS, architecture, provider, model, or anything else that matters.
    - type: textarea
      id: logs
      attributes:
          label: Logs, screenshots, or recordings
          description: Paste logs or attach screenshots if they help.
