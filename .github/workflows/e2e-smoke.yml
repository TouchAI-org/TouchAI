name: Desktop E2E Smoke

on:
    push:
        branches:
            - main
    pull_request:
    workflow_dispatch:

permissions:
    contents: read
    pull-requests: read

concurrency:
    group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

jobs:
    changes:
        name: Classify PR changes
        runs-on: ubuntu-latest
        outputs:
            docs_only: ${{ steps.classify.outputs.docs_only }}
            desktop_changed: ${{ steps.classify.outputs.desktop_changed }}
        steps:
            - id: classify
              name: Detect docs-only pull requests
              uses: actions/github-script@v9
              with:
                  script: |
                      if (context.eventName !== 'pull_request' && context.eventName !== 'push') {
                        core.setOutput('docs_only', 'false');
                        core.setOutput('desktop_changed', 'true');
                        return;
                      }

                      const docsOnlyPatterns = [
                        /^docs\//,
                        /^[^/]+\.md$/,
                        /^COPYING$/,
                        /^\.github\/ISSUE_TEMPLATE\//,
                        /^\.github\/dependabot\.yml$/,
                        /^\.github\/labeler\.yml$/,
                        /^\.github\/labels\.yml$/,
                        /^\.github\/pull_request_template\.md$/,
                        /^CLAUDE\.md$/,
                        /^CODE_OF_CONDUCT\.md$/,
                        /^CONTRIBUTING\.md$/,
                        /^README\.en\.md$/,
                        /^README\.md$/,
                        /^SECURITY\.md$/,
                        /^SUPPORT\.md$/,
                      ];
                      const desktopPatterns = [
                        /^apps\/desktop\//,
                        /^packages\//,
                        /^package\.json$/,
                        /^pnpm-lock\.yaml$/,
                        /^pnpm-workspace\.yaml$/,
                        /^\.github\/workflows\/e2e-smoke\.yml$/,
                      ];

                      let files = [];

                      if (context.eventName === 'pull_request') {
                        files = await github.paginate(github.rest.pulls.listFiles, {
                          ...context.repo,
                          pull_number: context.issue.number,
                          per_page: 100,
                        });
                      } else if (context.eventName === 'push') {
                        const before = context.payload.before;
                        const after = context.payload.after;

                        if (!before || !after || /^0+$/.test(before)) {
                          core.setOutput('docs_only', 'false');
                          core.setOutput('desktop_changed', 'true');
                          return;
                        }

                        const comparison = await github.rest.repos.compareCommits({
                          ...context.repo,
                          base: before,
                          head: after,
                        });

                        files = comparison.data.files ?? [];

                        if (files.length >= 300) {
                          core.setOutput('docs_only', 'false');
                          core.setOutput('desktop_changed', 'true');
                          return;
                        }
                      }

                      const docsOnly =
                        files.length > 0 &&
                        files.every((file) => docsOnlyPatterns.some((pattern) => pattern.test(file.filename)));
                      const filenames = files.map((file) => file.filename);
                      const desktopChanged =
                        filenames.length === 0 ||
                        filenames.some((filename) => desktopPatterns.some((pattern) => pattern.test(filename)));

                      core.setOutput('docs_only', docsOnly ? 'true' : 'false');
                      core.setOutput('desktop_changed', desktopChanged ? 'true' : 'false');

            - name: Report classification
              run: |
                  echo "docs_only=${{ steps.classify.outputs.docs_only }}"
                  echo "desktop_changed=${{ steps.classify.outputs.desktop_changed }}"

    desktop-e2e-smoke-windows:
        name: Desktop E2E Smoke (Windows)
        needs: changes
        if: needs.changes.outputs.docs_only != 'true' && needs.changes.outputs.desktop_changed == 'true'
        runs-on: windows-latest
        env:
            TOUCHAI_CARGO_TARGET_DIR: apps/desktop/src-tauri/target/e2e
        steps:
            - uses: actions/checkout@v4

            - uses: pnpm/action-setup@v6

            - uses: actions/setup-node@v6
              with:
                  node-version: 22
                  cache: pnpm

            - name: Install Rust stable
              uses: dtolnay/rust-toolchain@stable

            - name: Rust cache
              uses: swatinem/rust-cache@v2
              with:
                  workspaces: apps/desktop/src-tauri -> target/e2e

            - name: Install frontend dependencies
              run: pnpm install --frozen-lockfile

            - name: Install tauri-driver
              run: cargo install tauri-driver --locked

            - name: Install Edge WebDriver
              shell: pwsh
              run: |
                  cargo install msedgedriver-tool
                  msedgedriver-tool.exe
                  "$PWD" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

            - name: Run desktop smoke tests
              run: pnpm test:e2e
